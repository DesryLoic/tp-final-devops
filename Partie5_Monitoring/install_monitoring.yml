---
- name: Installation des sondes Node Exporter sur TOUTES les VMs
  hosts: all
  become: yes
  tasks:
    - name: Mettre a jour le cache APT
      apt: update_cache=yes cache_valid_time=3600

    - name: Installer Node Exporter (Sonde)
      apt:
        name: prometheus-node-exporter
        state: present

    - name: S'assurer que Node Exporter tourne
      service:
        name: prometheus-node-exporter
        state: started
        enabled: yes

- name: Installation de Prometheus et Grafana sur la VM de monitoring
  hosts: monitoring
  become: yes
  tasks:
    - name: Installer Prometheus (Cerveau)
      apt:
        name: prometheus
        state: present

    - name: Configurer Prometheus pour ecouter les deux VMs
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'node_exporter'
              static_configs:
                - targets: ['192.168.1.19:9100', '192.168.1.22:9100']
        mode: '0644'
      notify: Redemarrer Prometheus

    - name: Telecharger le package Grafana (Ecran)
      get_url:
        url: https://dl.grafana.com/oss/release/grafana_10.4.0_amd64.deb
        dest: /tmp/grafana.deb

    - name: Installer Grafana
      apt:
        deb: /tmp/grafana.deb

    - name: S'assurer que Grafana tourne
      service:
        name: grafana-server
        state: started
        enabled: yes

  handlers:
    - name: Redemarrer Prometheus
      service:
        name: prometheus
        state: restarted
